<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un Millón de Firmas por la Universidad Pública</title>
<style>
  :root {
    --azul: #1d3557;
    --celeste: #457b9d;
    --claro: #f1faee;
    --acento: #e63946;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--claro);
    color: var(--azul);
  }
  header {
    background: var(--azul);
    color: white;
    padding: 28px 16px;
    text-align: center;
  }
  header h1 { margin: 0 0 8px; font-size: 1.8rem; }
  header p { margin: 0; opacity: 0.85; }
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 16px 60px;
  }
  .panel {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 28px;
    text-align: center;
  }
  .contador {
    font-size: 3rem;
    font-weight: 700;
    color: var(--acento);
    margin: 4px 0;
  }
  .meta-texto { font-size: 1rem; color: var(--celeste); margin-bottom: 18px; }
  .barra-fondo {
    width: 100%;
    background: #e0e0e0;
    border-radius: 999px;
    height: 28px;
    overflow: hidden;
  }
  .barra-relleno {
    height: 100%;
    background: linear-gradient(90deg, var(--celeste), var(--acento));
    width: 0%;
    transition: width 0.6s ease;
    border-radius: 999px;
  }
  .porcentaje { margin-top: 10px; font-weight: 600; }
  footer {
    text-align: center;
    padding: 18px;
    font-size: 0.85rem;
    color: var(--celeste);
  }
</style>
</head>
<body>
  <header>
    <h1>Un Millón de Firmas por la Universidad Pública</h1>
    <p>Sumamos firmas de todo el país en apoyo al tratamiento urgente del financiamiento universitario</p>
  </header>

  <main>
    <section class="panel">
      <div class="contador" id="contador">0</div>
      <div class="meta-texto">de <span id="meta-texto">1.000.000</span> firmas</div>
      <div class="barra-fondo">
        <div class="barra-relleno" id="barra"></div>
      </div>
      <div class="porcentaje" id="porcentaje">0%</div>
    </section>
  </main>

  <footer>
    Conteo actualizado en tiempo real a partir de las actas cargadas por los usuarios registrados.
  </footer>

<script>
  function formatearNumero(n) {
    return n.toLocaleString('es-AR');
  }

  async function actualizarContador() {
    try {
      const resp = await fetch('/api/total');
      const datos = await resp.json();
      const total = datos.total || 0;
      const meta = datos.meta || 1000000;
      const porcentaje = Math.min(100, (total / meta) * 100);

      document.getElementById('contador').textContent = formatearNumero(total);
      document.getElementById('meta-texto').textContent = formatearNumero(meta);
      document.getElementById('barra').style.width = porcentaje.toFixed(2) + '%';
      document.getElementById('porcentaje').textContent = porcentaje.toFixed(1) + '%';
    } catch (e) {
      console.error('No se pudo actualizar el contador', e);
    }
  }

  actualizarContador();
  setInterval(actualizarContador, 15000);
</script>
</body>
</html>
