<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petitorio – Un Millón de Firmas por la Universidad Pública</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

  :root {
    --violeta: #6B2D91;
    --violeta-oscuro: #4A1D6B;
    --violeta-claro: #9B5CC4;
    --lavanda: #F0E6FA;
    --amarillo: #F5C842;
    --blanco: #ffffff;
    --texto: #2d1a42;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
    background: var(--lavanda);
    color: var(--texto);
    max-width: 860px;
    margin: 0 auto;
  }

  /* Imágenes de sección — full width, responsive */
  .seccion-imagen {
    width: 100%;
    display: block;
  }

  /* ── ACCIONES ── */
  .seccion-acciones {
    background: linear-gradient(135deg, #f9f3ff 0%, #ede0fa 100%);
    padding: 22px 24px;
    border-bottom: 3px solid var(--violeta-claro);
  }

  .seccion-acciones h2 {
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--violeta);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }

  .acciones-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 500px) { .acciones-grid { grid-template-columns: 1fr; } }

  .accion-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--blanco);
    border-radius: 12px;
    padding: 13px 15px;
    text-decoration: none;
    color: var(--violeta-oscuro);
    font-weight: 700;
    font-size: 0.87rem;
    box-shadow: 0 2px 8px rgba(107,45,145,0.12);
    border: 1px solid #dcc4f5;
    transition: all 0.2s;
    line-height: 1.4;
  }
  .accion-item:hover {
    background: var(--violeta);
    color: var(--blanco);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(107,45,145,0.25);
  }
  .accion-item .icono { font-size: 1.5rem; flex-shrink: 0; }

  /* Contactos */
  .contactos-titulo { font-weight:700; color:var(--violeta); margin-top:18px; margin-bottom:10px; font-size:0.88rem; text-transform:uppercase; letter-spacing:1px; }
  .contacto-item { display:flex; align-items:baseline; gap:8px; padding:7px 0; border-bottom:1px solid #e0ccf5; font-size:0.9rem; color:#3d2255; }
  .contacto-item:last-child { border-bottom:none; }
  .contacto-prov { font-weight:700; min-width:110px; color:var(--violeta); }
  .contactos-vacio { font-size:0.88rem; color:#aaa; font-style:italic; }

  /* ── CONTADOR ── */
  .seccion-contador {
    background: linear-gradient(135deg, var(--violeta-oscuro) 0%, var(--violeta) 100%);
    padding: 28px 24px 22px;
    text-align: center;
    color: var(--blanco);
  }

  .contador-label {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.75;
    margin-bottom: 8px;
  }

  .numero-firmas {
    font-size: clamp(3rem, 10vw, 5rem);
    font-weight: 900;
    color: var(--amarillo);
    line-height: 1;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  }

  .meta-texto { font-size: 0.88rem; opacity: 0.8; margin: 6px 0 18px; }

  .barra-fondo {
    width: 100%;
    background: rgba(255,255,255,0.2);
    border-radius: 999px;
    height: 24px;
    overflow: hidden;
  }

  .barra-relleno {
    height: 100%;
    background: linear-gradient(90deg, var(--amarillo), #ff9f00);
    width: 0%;
    transition: width 0.8s ease;
    border-radius: 999px;
  }

  .porcentaje { margin-top: 9px; font-weight: 700; font-size: 1.1rem; color: var(--amarillo); }

  .btn-desglose {
    margin-top: 16px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.4);
    color: var(--blanco);
    padding: 8px 22px;
    border-radius: 999px;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.87rem;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-desglose:hover { background: rgba(255,255,255,0.25); border-color: var(--amarillo); color: var(--amarillo); }

  .desglose { margin-top: 18px; text-align: left; display: none; }
  .desglose table { width: 100%; border-collapse: collapse; font-size: 0.9rem; color: var(--blanco); }
  .desglose th, .desglose td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.15); }
  .desglose th { opacity: 0.7; font-weight: 700; text-transform: uppercase; font-size: 0.78rem; letter-spacing: 1px; }
  .desglose .subtotal-inst { font-weight: 700; color: var(--amarillo); }

  footer {
    text-align: center;
    padding: 14px 16px 32px;
    font-size: 0.75rem;
    color: var(--violeta-claro);
    background: var(--lavanda);
  }

  .version { position: fixed; bottom: 8px; right: 12px; font-size: 0.72rem; color: #aaa; opacity: 0.6; }
</style>
</head>
<body>

  <!-- HEADER -->
  <img class="seccion-imagen" src="/header.png" alt="Petitorio a la Corte Suprema de Justicia de la Nación">

  <!-- CONTADOR -->
  <div class="seccion-contador">
    <div class="contador-label">📢 Firmas recolectadas</div>
    <div class="numero-firmas" id="contador">0</div>
    <div class="meta-texto">de <span id="meta-texto">1.000.000</span> firmas</div>
    <div class="barra-fondo"><div class="barra-relleno" id="barra"></div></div>
    <div class="porcentaje" id="porcentaje">0%</div>
    <button class="btn-desglose" onclick="toggleDesglose()">▼ Ver desglose por provincias</button>
    <div class="desglose" id="desglose">
      <div id="tabla-desglose">Cargando…</div>
    </div>
  </div>

  <!-- CUERPO (cómo colaborar) -->
  <img class="seccion-imagen" src="/cuerpo.png" alt="Cómo colaborar">

  <!-- ACCIONES -->
  <div class="seccion-acciones">
    <h2>📥 Descargá y participá</h2>
    <div class="acciones-grid" style="grid-template-columns:1fr;">
      <a class="accion-item" href="https://drive.google.com/file/d/1BEe6Oge5Q9cAQstv1NmcTP6Wb9duO25X/view" target="_blank" rel="noopener">
        <span class="icono">📄</span>
        <span>Descargá el petitorio (doble faz)</span>
      </a>
    </div>
    <div class="contactos-titulo">📞 Enviá las hojas a tu contacto provincial</div>
    <div id="contactos-lista"><span class="contactos-vacio">Cargando…</span></div>
  </div>

  <!-- PIE -->
  <img class="seccion-imagen" src="/pie.png" alt="Vamos por el millón de firmas">

  <footer>Conteo actualizado en tiempo real a partir de las actas cargadas por las instituciones participantes.</footer>

<div class="version">v1.27</div>

<script>
  let desgloseVisible = false;
  let desglosesCargado = false;

  function formatearNumero(n) { return n.toLocaleString('es-AR'); }

  async function actualizarContador() {
    try {
      const resp = await fetch('/api/total');
      const datos = await resp.json();
      const total = datos.total || 0;
      const meta = datos.meta || 1000000;
      const porcentaje = Math.min(100, (total / meta) * 100);
      document.getElementById('contador').textContent = formatearNumero(total);
      document.getElementById('meta-texto').textContent = formatearNumero(meta);
      document.getElementById('barra').style.width = porcentaje.toFixed(2) + '%';
      document.getElementById('porcentaje').textContent = porcentaje.toFixed(1) + '%';
    } catch (e) { console.error('No se pudo actualizar el contador', e); }
  }

  async function cargarDesglose() {
    try {
      const resp = await fetch('/api/desglose');
      const datos = await resp.json();
      const inst = datos.provincias;
      if (!inst || inst.length === 0) {
        document.getElementById('tabla-desglose').textContent = 'Todavía no hay firmas registradas.';
        return;
      }
      let html = '<table><tr><th>Provincia</th><th>Firmas</th></tr>';
      for (const i of inst) {
        const nombre = i.provincia || i.username;
        html += `<tr><td>${nombre}</td><td class="subtotal-inst">${Number(i.total).toLocaleString('es-AR')}</td></tr>`;
      }
      html += '</table>';
      document.getElementById('tabla-desglose').innerHTML = html;
    } catch (e) {
      document.getElementById('tabla-desglose').textContent = 'No se pudo cargar el desglose.';
    }
  }

  function toggleDesglose() {
    const div = document.getElementById('desglose');
    const btn = document.querySelector('.btn-desglose');
    desgloseVisible = !desgloseVisible;
    div.style.display = desgloseVisible ? 'block' : 'none';
    btn.textContent = desgloseVisible ? '▲ Ocultar desglose' : '▼ Ver desglose por provincias';
    if (desgloseVisible && !desglosesCargado) {
      cargarDesglose();
      desglosesCargado = true;
    }
  }

  async function cargarContactos() {
    try {
      const resp = await fetch('/api/contactos');
      const datos = await resp.json();
      const cont = document.getElementById('contactos-lista');
      if (!datos.contactos || datos.contactos.length === 0) {
        cont.innerHTML = '<span class="contactos-vacio">Próximamente se publicarán los contactos por provincia.</span>';
        return;
      }
      let html = '';
      for (const c of datos.contactos) {
        const digitos = c.contacto.replace(/\D/g,'');
        const waNum = digitos.startsWith('549') ? digitos : '549' + digitos;
        const waLink = digitos.length >= 8
          ? `<a href="https://wa.me/${waNum}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;background:#25D366;color:white;padding:4px 12px;border-radius:999px;text-decoration:none;font-size:0.82rem;font-weight:700;margin-left:8px;">📱 WhatsApp</a>`
          : `<span>${c.contacto}</span>`;
        html += `<div class="contacto-item"><span class="contacto-prov">${c.provincia}</span>${waLink}</div>`;
      }
      cont.innerHTML = html;
    } catch (e) {
      document.getElementById('contactos-lista').innerHTML = '<span class="contactos-vacio">No se pudo cargar.</span>';
    }
  }

  actualizarContador();
  cargarContactos();
  setInterval(actualizarContador, 15000);
</script>
</body>
</html>
