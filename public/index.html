<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un Millón de Firmas por la Universidad Pública</title>
<style>
  :root { --azul: #1d3557; --celeste: #457b9d; --claro: #f1faee; --acento: #e63946; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Segoe UI', Roboto, Arial, sans-serif; background:var(--claro); color:var(--azul); }
  header { background:var(--azul); color:white; padding:22px 16px 18px; text-align:center; }
  .logos { display:flex; justify-content:center; align-items:center; gap:20px; margin-bottom:14px; flex-wrap:wrap; }
  .logos img { height:64px; object-fit:contain; border-radius:6px; }
  header h1 { margin:0 0 6px; font-size:1.7rem; }
  header p { margin:0; opacity:0.85; font-size:0.95rem; }
  main { max-width:760px; margin:0 auto; padding:32px 16px 60px; }
  .panel { background:white; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); padding:28px; text-align:center; }
  .contador { font-size:3rem; font-weight:700; color:var(--acento); margin:4px 0; }
  .meta-texto { font-size:1rem; color:var(--celeste); margin-bottom:18px; }
  .barra-fondo { width:100%; background:#e0e0e0; border-radius:999px; height:28px; overflow:hidden; }
  .barra-relleno { height:100%; background:linear-gradient(90deg, var(--celeste), var(--acento)); width:0%; transition:width 0.6s ease; border-radius:999px; }
  .porcentaje { margin-top:10px; font-weight:600; }
  .btn-desglose { margin-top:22px; background:none; border:2px solid var(--celeste); color:var(--celeste); padding:9px 20px; border-radius:8px; font-weight:700; cursor:pointer; font-size:0.95rem; }
  .btn-desglose:hover { background:var(--celeste); color:white; }
  .desglose { margin-top:18px; text-align:left; display:none; }
  .desglose table { width:100%; border-collapse:collapse; font-size:0.93rem; }
  .desglose th, .desglose td { padding:8px 10px; border-bottom:1px solid #eee; text-align:left; }
  .desglose th { color:var(--celeste); }
  .desglose .subtotal-inst { font-weight:700; }
  footer { text-align:center; padding:18px; font-size:0.85rem; color:var(--celeste); }
</style>
</head>
<body>
  <header>
    <div class="logos">
      <img src="/MYP.jpg" alt="Madres y Padres por la Educación Pública">
      <img src="/escmb.png" alt="Escuela Superior de Comercio Manuel Belgrano">
    </div>
    <h1>Un Millón de Firmas por la Universidad Pública</h1>
    <p>Sumamos firmas de todo el país en apoyo al tratamiento urgente del financiamiento universitario</p>
  </header>

  <main>
    <section class="panel">
      <div class="contador" id="contador">0</div>
      <div class="meta-texto">de <span id="meta-texto">1.000.000</span> firmas</div>
      <div class="barra-fondo"><div class="barra-relleno" id="barra"></div></div>
      <div class="porcentaje" id="porcentaje">0%</div>

      <button class="btn-desglose" onclick="toggleDesglose()">▼ Ver desglose por institución</button>
      <div class="desglose" id="desglose">
        <div id="tabla-desglose">Cargando…</div>
      </div>
    </section>
  </main>

  <footer>Conteo actualizado en tiempo real a partir de las actas cargadas por las instituciones participantes.</footer>

<div style="position:fixed;bottom:8px;right:12px;font-size:0.75rem;color:#aaa;opacity:0.7;">v1.10</div>

<script>
  let desgloseVisible = false;
  let desglosesCargado = false;

  function formatearNumero(n) { return n.toLocaleString('es-AR'); }

  async function actualizarContador() {
    try {
      const resp = await fetch('/api/total');
      const datos = await resp.json();
      const total = datos.total || 0;
      const meta = datos.meta || 1000000;
      const porcentaje = Math.min(100, (total / meta) * 100);
      document.getElementById('contador').textContent = formatearNumero(total);
      document.getElementById('meta-texto').textContent = formatearNumero(meta);
      document.getElementById('barra').style.width = porcentaje.toFixed(2) + '%';
      document.getElementById('porcentaje').textContent = porcentaje.toFixed(1) + '%';
    } catch (e) { console.error('No se pudo actualizar el contador', e); }
  }

  async function cargarDesglose() {
    try {
      const resp = await fetch('/api/desglose');
      const datos = await resp.json();
      const inst = datos.instituciones;
      if (!inst || inst.length === 0) {
        document.getElementById('tabla-desglose').textContent = 'Todavía no hay firmas registradas.';
        return;
      }
      let html = '<table><tr><th>Institución</th><th>Firmas</th></tr>';
      for (const i of inst) {
        const nombre = i.nombre_institucion || i.username;
        html += `<tr><td>${nombre}</td><td class="subtotal-inst">${Number(i.total).toLocaleString('es-AR')}</td></tr>`;
      }
      html += '</table>';
      document.getElementById('tabla-desglose').innerHTML = html;
    } catch (e) {
      document.getElementById('tabla-desglose').textContent = 'No se pudo cargar el desglose.';
    }
  }

  function toggleDesglose() {
    const div = document.getElementById('desglose');
    const btn = document.querySelector('.btn-desglose');
    desgloseVisible = !desgloseVisible;
    div.style.display = desgloseVisible ? 'block' : 'none';
    btn.textContent = desgloseVisible ? '▲ Ocultar desglose' : '▼ Ver desglose por institución';
    if (desgloseVisible && !desglosesCargado) {
      cargarDesglose();
      desglosesCargado = true;
    }
  }

  actualizarContador();
  setInterval(actualizarContador, 15000);
</script>
</body>
</html>
